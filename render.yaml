services:
  - type: web
    name: media-downloader-api
    runtime: docker
    plan: free
    envVars:
      - key: API_KEY
        generateValue: true        # Render auto-generates a secure random value
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: production
      - key: RATE_LIMIT
        value: "30"
      - key: RATE_WINDOW_MS
        value: "60000"
      - key: REQUEST_TIMEOUT
        value: "60000"
      - key: PROXY_URL
        value: ""
    healthCheckPath: /api/health
